<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonebook Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --color-primary: #0D9488;
            --color-primary-hover: #0F766E;
            --color-on-primary: #FFFFFF;
            --color-secondary: #14B8A6;
            --color-accent: #EA580C;
            --color-accent-hover: #C2410C;
            --color-background: #F0FDFA;
            --color-surface: #FFFFFF;
            --color-foreground: #134E4A;
            --color-muted: #E8F1F4;
            --color-border: #99F6E4;
            --color-border-subtle: #E2E8F0;
            --color-destructive: #DC2626;
            --color-destructive-hover: #B91C1C;
            --color-ring: #0D9488;
            --color-placeholder: #64748B;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.07);
            --shadow-xl: 0 20px 25px rgba(0, 0, 0, 0.1);
            --space-xs: 0.25rem;
            --space-sm: 0.5rem;
            --space-md: 1rem;
            --space-lg: 1.5rem;
            --space-xl: 2rem;
            --space-2xl: 3rem;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-full: 9999px;
            --transition-fast: 150ms ease;
            --transition-base: 200ms ease;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--color-background);
            color: var(--color-foreground);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5, h6, p {
            margin: 0;
        }

        a {
            color: var(--color-primary);
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        a:hover {
            color: var(--color-primary-hover);
            text-decoration: underline;
        }

        /* Buttons */
        .btn-custom {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            padding: 0.625rem 1.25rem;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all var(--transition-base);
            line-height: 1.5;
        }

        .btn-custom:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.3);
        }

        .btn-primary-custom {
            background-color: var(--color-accent);
            color: var(--color-on-primary);
        }

        .btn-primary-custom:hover:not(:disabled) {
            background-color: var(--color-accent-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary-custom {
            background-color: transparent;
            color: var(--color-primary);
            border: 2px solid var(--color-primary);
        }

        .btn-secondary-custom:hover:not(:disabled) {
            background-color: var(--color-primary);
            color: var(--color-on-primary);
        }

        .btn-ghost-custom {
            background-color: transparent;
            color: var(--color-foreground);
            border: 1px solid var(--color-border-subtle);
        }

        .btn-ghost-custom:hover:not(:disabled) {
            background-color: var(--color-muted);
            border-color: var(--color-border);
        }

        .btn-danger-custom {
            background-color: var(--color-destructive);
            color: var(--color-on-primary);
        }

        .btn-danger-custom:hover:not(:disabled) {
            background-color: var(--color-destructive-hover);
            transform: translateY(-1px);
        }

        .btn-custom:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Cards */
        .card-custom {
            background-color: var(--color-surface);
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-base);
            overflow: hidden;
        }

        .card-custom.clickable:hover:not(.card-disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            border-color: var(--color-secondary);
        }

        .card-custom.clickable {
            cursor: pointer;
        }

        /* Inputs */
        .input-custom {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--color-border-subtle);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-family: inherit;
            color: var(--color-foreground);
            background-color: var(--color-surface);
            transition: border-color var(--transition-base), box-shadow var(--transition-base);
        }

        .input-custom::placeholder {
            color: var(--color-placeholder);
        }

        .input-custom:focus {
            outline: none;
            border-color: var(--color-ring);
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15);
        }

        .input-custom.error {
            border-color: var(--color-destructive);
        }

        .input-custom.error:focus {
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15);
        }

        .input-label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: var(--space-sm);
            color: var(--color-foreground);
        }

        .input-hint {
            font-size: 0.85rem;
            color: var(--color-placeholder);
            margin-top: var(--space-xs);
        }

        .input-error {
            font-size: 0.85rem;
            color: var(--color-destructive);
            margin-top: var(--space-xs);
        }

        .input-group-custom {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group-custom .input-icon {
            position: absolute;
            left: 1rem;
            color: var(--color-placeholder);
            pointer-events: none;
            z-index: 1;
        }

        .input-group-custom .input-custom {
            padding-left: 2.75rem;
        }

        /* Navbar */
        .app-navbar {
            background-color: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            padding: var(--space-md) 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand-custom {
            display: inline-flex;
            align-items: center;
            gap: var(--space-sm);
            color: var(--color-foreground);
            font-weight: 700;
            font-size: 1.25rem;
            text-decoration: none;
        }

        .navbar-brand-custom:hover {
            color: var(--color-primary);
            text-decoration: none;
        }

        .navbar-brand-custom .brand-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background-color: var(--color-primary);
            color: var(--color-on-primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Avatar */
        .avatar {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-full);
            background-color: var(--color-primary);
            color: var(--color-on-primary);
            font-weight: 700;
            flex-shrink: 0;
        }

        .avatar-lg {
            width: 64px;
            height: 64px;
            font-size: 1.5rem;
        }

        .avatar-md {
            width: 48px;
            height: 48px;
            font-size: 1.1rem;
        }

        .avatar-sm {
            width: 36px;
            height: 36px;
            font-size: 0.9rem;
        }

        /* Info chips */
        .info-chip {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-md);
            background-color: var(--color-background);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
        }

        .info-chip-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-full);
            background-color: var(--color-surface);
            color: var(--color-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .info-chip-label {
            font-size: 0.8rem;
            color: var(--color-placeholder);
            text-transform: uppercase;
            letter-spacing: 0.025em;
            margin-bottom: 0.125rem;
        }

        .info-chip-value {
            font-weight: 600;
            color: var(--color-foreground);
            word-break: break-word;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: var(--space-md);
            right: var(--space-md);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            max-width: 360px;
            width: calc(100% - 2rem);
        }

        .toast-item {
            padding: var(--space-md) var(--space-lg);
            border-radius: var(--radius-sm);
            background-color: var(--color-surface);
            color: var(--color-foreground);
            box-shadow: var(--shadow-lg);
            border-left: 4px solid var(--color-primary);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            font-size: 0.95rem;
            animation: toastIn 300ms ease backwards;
        }

        .toast-item.toast-success {
            border-left-color: var(--color-primary);
        }

        .toast-item.toast-error {
            border-left-color: var(--color-destructive);
        }

        .toast-item.toast-info {
            border-left-color: var(--color-secondary);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Spinner */
        .spinner {
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: var(--space-2xl) var(--space-md);
        }

        .empty-state-icon {
            width: 96px;
            height: 96px;
            border-radius: var(--radius-full);
            background-color: var(--color-muted);
            color: var(--color-primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: var(--space-lg);
        }

        /* Page transitions */
        .fade-enter-active,
        .fade-leave-active {
            transition: opacity var(--transition-base);
        }

        .fade-enter-from,
        .fade-leave-to {
            opacity: 0;
        }

        /* Stagger animation for cards */
        .stagger-item {
            animation: fadeUp 400ms ease backwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Pagination */
        .pagination-custom {
            display: flex;
            gap: var(--space-xs);
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .pagination-custom .page-btn {
            min-width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-border-subtle);
            background-color: var(--color-surface);
            color: var(--color-foreground);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .pagination-custom .page-btn:hover:not(:disabled) {
            background-color: var(--color-muted);
            border-color: var(--color-border);
        }

        .pagination-custom .page-btn:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.3);
        }

        .pagination-custom .page-btn.active {
            background-color: var(--color-primary);
            border-color: var(--color-primary);
            color: var(--color-on-primary);
        }

        .pagination-custom .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-custom .page-ellipsis {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            color: var(--color-placeholder);
        }

        /* Auth pages */
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-md);
            background-color: var(--color-background);
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background-color: var(--color-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-xl);
            padding: var(--space-2xl);
        }

        .auth-logo {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-md);
            background-color: var(--color-primary);
            color: var(--color-on-primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin-bottom: var(--space-lg);
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            .auth-card {
                padding: var(--space-xl);
            }

            .navbar-actions {
                width: 100%;
                flex-direction: column;
                align-items: stretch;
                gap: var(--space-sm);
                margin-top: var(--space-md);
                padding-top: var(--space-md);
                border-top: 1px solid var(--color-border);
            }

            .navbar-actions .btn-custom {
                width: 100%;
            }

            .info-grid {
                grid-template-columns: 1fr !important;
            }
        }

        /* Focus visible for all interactive elements */
        button:focus-visible,
        a:focus-visible,
        input:focus-visible,
        textarea:focus-visible,
        select:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.3);
        }

        /* Utility */
        .text-primary-custom { color: var(--color-primary) !important; }
        .text-accent { color: var(--color-accent) !important; }
        .text-muted-custom { color: var(--color-placeholder) !important; }
        .bg-surface { background-color: var(--color-surface) !important; }
        .border-custom { border-color: var(--color-border) !important; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="src/main.js?v=3"></script>
</body>
</html>
